services:
    open-webui:
        image: ghcr.io/open-webui/open-webui:main
        container_name: open-webui-rot
        ports:
            - "3000:8080"
        environment:
            - OPENAI_API_BASE_URL=http://proxy-service:8000/v1
            - OPENAI_API_KEY=dummy_key
        networks:
            - app-network-rot
        depends_on:
            - proxy-service
        restart: unless-stopped

    proxy-service:
        build:
            context: ./proxy-service
            dockerfile: Dockerfile
        container_name: proxy-server-rot
        environment:
            - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
            - DEEPSEEK_API_URL=${DEEPSEEK_API_URL}
            - MCP_SERVER_URL=http://mcp-server:8001
            - REDIS_URL=redis://redis:6379
        ports:
            - "8000:8000"
        networks:
            - app-network-rot
        depends_on:
            - redis
            - mcp-server
        restart: unless-stopped

    mcp-server:
        build:
            context: ./mcp-server
            dockerfile: Dockerfile
        container_name: mcp-server-rot
        environment:
            - EMBEDDING_SERVICE_URL=http://embedding-service:8005
            - QDRANT_SERVICE_URL=http://qdrant-service:8006
        ports:
            - "8001:8001"
        networks:
            - app-network-rot
        depends_on:
            - embedding-service
            - qdrant-service
        restart: unless-stopped

    minio:
        image: minio/minio
        container_name: minio-rot
        command: server /data --console-address ":9001"
        environment:
            - MINIO_ROOT_USER=${MINIO_ROOT_USER}
            - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
        ports:
            - "9000:9000"
            - "9001:9001"
        volumes:
            - minio-data:/data
        networks:
            - app-network-rot
        restart: unless-stopped

    storage-service:
        build:
            context: ./storage-service
            dockerfile: Dockerfile
        container_name: storage-service-rot
        environment:
            - S3_ENDPOINT_URL=http://minio:9000
            - S3_ACCESS_KEY=${MINIO_ROOT_USER}
            - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD}
            - S3_BUCKET_NAME=documents
        ports:
            - "8002:8002"
        networks:
            - app-network-rot
        depends_on:
            - minio
        restart: unless-stopped

    parser-service:
        build:
            context: ./parser-service
            dockerfile: Dockerfile
        container_name: parser-service-rot
        environment:
            - STORAGE_SERVICE_URL=http://storage-service:8002
        ports:
            - "8003:8003"
        networks:
            - app-network-rot
        depends_on:
            - storage-service
        restart: unless-stopped

    chunking-service:
        build:
            context: ./chunking-service
            dockerfile: Dockerfile
        container_name: chunking-service-rot
        environment:
            - STORAGE_SERVICE_URL=http://storage-service:8002
            - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
            - DEEPSEEK_API_URL=https://api.deepseek.com
            - DEEPSEEK_MODEL=deepseek-chat
            - CHUNK_SIZE=512
            - DEFAULT_STRATEGY=agentic
        ports:
            - "8004:8004"
        networks:
            - app-network-rot
        depends_on:
            - storage-service
        restart: unless-stopped

    embedding-service:
        build:
            context: ./embedding-service
            dockerfile: Dockerfile
        container_name: embedding-service-rot
        environment:
            - JINA_EMBEDDING_API_KEY=${JINA_EMBEDDING_API_KEY}
            - JINA_EMBEDDING_BASE_URL=${JINA_EMBEDDING_BASE_URL}
            - JINA_EMBEDDING_MODEL=${JINA_EMBEDDING_MODEL}
            - EMBEDDING_DIMENSIONS=2048
            - REDIS_URL=redis://redis:6379
        ports:
            - "8005:8005"
        networks:
            - app-network-rot
        depends_on:
            - redis
        restart: unless-stopped

    qdrant:
        image: qdrant/qdrant:v1.13.6
        container_name: qdrant-rot
        ports:
            - "6333:6333"
            - "6334:6334"
        volumes:
            - qdrant-data:/qdrant/storage
        networks:
            - app-network-rot
        restart: unless-stopped

    qdrant-service:
        build:
            context: ./qdrant-service
            dockerfile: Dockerfile
        container_name: qdrant-service-rot
        environment:
            - QDRANT_HOST=qdrant
            - QDRANT_PORT=6333
            - COLLECTION_NAME=documents
            - EMBEDDING_DIMENSIONS=2048
        ports:
            - "8006:8006"
        networks:
            - app-network-rot
        depends_on:
            - qdrant
        restart: unless-stopped

    redis:
        image: redis:7-alpine
        container_name: redis-rot
        networks:
            - app-network-rot
        restart: unless-stopped

volumes:
    minio-data:
    qdrant-data:

networks:
    app-network-rot:
        driver: bridge
