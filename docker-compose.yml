services:
    open-webui:
        image: ghcr.io/open-webui/open-webui:main
        container_name: open-webui-rot
        ports:
            - "3000:8080"
        environment:
            - OPENAI_API_BASE_URL=http://proxy-service:8000/v1
            - OPENAI_API_KEY=dummy_key
        networks:
            - app-network-rot
        depends_on:
            - proxy-service
        restart: unless-stopped

    proxy-service:
        build:
            context: ./proxy-service
            dockerfile: Dockerfile
        container_name: proxy-server-rot
        environment:
            - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
            - DEEPSEEK_API_URL=${DEEPSEEK_API_URL}
            - MCP_SERVER_URL=http://mcp-server:8001
            - REDIS_URL=redis://redis:6379
        ports:
            - "8000:8000"
        networks:
            - app-network-rot
        depends_on:
            - redis
            - mcp-server
        restart: unless-stopped

    mcp-server:
        build:
            context: ./mcp-server
            dockerfile: Dockerfile
        container_name: mcp-server-rot
        ports:
            - "8001:8001"
        networks:
            - app-network-rot
        restart: unless-stopped

    minio:
        image: minio/minio
        container_name: minio-rot
        command: server /data --console-address ":9001"
        environment:
            - MINIO_ROOT_USER=${MINIO_ROOT_USER}
            - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
        ports:
            - "9000:9000"
            - "9001:9001"
        volumes:
            - minio-data:/data
        networks:
            - app-network-rot
        restart: unless-stopped

    storage-service:
        build:
            context: ./storage-service
            dockerfile: Dockerfile
        container_name: storage-service-rot
        environment:
            - S3_ENDPOINT_URL=http://minio:9000
            - S3_ACCESS_KEY=${MINIO_ROOT_USER}
            - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD}
            - S3_BUCKET_NAME=documents
        ports:
            - "8002:8002"
        networks:
            - app-network-rot
        depends_on:
            - minio
        restart: unless-stopped

    redis:
        image: redis:7-alpine
        container_name: redis-rot
        networks:
            - app-network-rot
        restart: unless-stopped

volumes:
    minio-data:

networks:
    app-network-rot:
        driver: bridge
